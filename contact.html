<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact NexHire AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .contact-container {
            max-width: 600px;
            margin: 10rem auto 6rem;
            padding: 3rem;
        }
        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 0.5rem;
            color: white;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="glow-orb orb-2" style="top: 0; right: 0;"></div>
    <div class="bg-grid"></div>

    <nav class="navbar" style="background: rgba(9, 9, 11, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);">
        <div class="container nav-container">
            <a href="/" class="logo">
                <i class="fa-solid fa-brain"></i>
                NexHire<span>AI</span>
            </a>
            <div class="nav-links">
                <a href="/about.html">About Us</a>
                <a href="/contact.html" style="color:white;">Contact</a>
                <a href="/">Go Home</a>
            </div>
            <div class="nav-actions">
                <a href="/index.html#pricing" class="btn btn-primary">Start Hiring</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="contact-container glass-card fade-in-up">
            <div class="contact-header">
                <h2>Get in Touch</h2>
                <p>Have questions about enterprise plans or our algorithm?</p>
            </div>
            <form id="contact-form">
                <div class="form-group">
                    <label>Work Email</label>
                    <input type="email" id="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" rows="5" required placeholder="How can we help your team scale?"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Send Message</button>
            </form>
            <div id="response-message" style="margin-top: 1rem; text-align: center; color: var(--success-color); display: none;"></div>
        </div>
    </div>

    <script>
        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const responseMsg = document.getElementById('response-message');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;

            const payload = {
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                btn.innerHTML = 'Send Message';
                btn.disabled = false;
                
                responseMsg.style.display = 'block';
                responseMsg.innerText = data.message;
                document.getElementById('contact-form').reset();
            } catch (err) {
                btn.innerHTML = 'Error Sending';
            }
        });
    </script>
</body>
</html>
